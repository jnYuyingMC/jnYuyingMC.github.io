<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 全景 - 大育英帝国 Minecraft 计划</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --mdui-color-primary: #00897b;
      --mdui-color-on-primary: #ffffff;
      --mdui-color-primary-container: #a7f3d0;
      --mdui-color-surface: #fdfcff;
      --mdui-color-surface-variant: #ece4e0;
    }
    body { background: #f5f5f5; }

    .page-header {
      position: relative;
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('images/background.jpg') center/cover no-repeat;
      filter: brightness(0.45);
    }
    .page-header-content {
      position: relative;
      z-index: 1;
      color: #fff;
      padding: 2rem;
    }
    .page-header-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .vr-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .vr-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }
    .vr-card-body {
      padding: 1.5rem 2rem 2rem;
    }
    .vr-card h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #333;
    }
    .vr-card p {
      color: #666;
      line-height: 1.7;
      margin: 0 0 1rem;
    }
    .vr-card mdui-button {
      margin-right: 0.5rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      overflow: visible;
    }
    .theme-dropdown mdui-menu {
      min-width: 160px;
    }

    .site-footer {
      background: #263238;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      line-height: 2;
    }
    .site-footer a { color: #a7f3d0; text-decoration: none; }

    .mdui-theme-dark { background: #121212; }
    .mdui-theme-dark body { background: #121212; }
    .mdui-theme-dark .vr-card { background: #1e1e1e; }
    .mdui-theme-dark .vr-card h3 { color: #e0e0e0; }
    .mdui-theme-dark .vr-card p { color: #aaa; }
    .mdui-theme-dark .site-footer { background: #0d1117; }

    @media (max-width: 600px) {
      .page-header-content h1 { font-size: 1.6rem; }
      .page-header { min-height: 30vh; }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <mdui-dropdown class="theme-dropdown" placement="bottom-end">
      <mdui-button slot="trigger" variant="text" title="切换主题">
        <mdui-icon name="settings_suggest" slot="icon" id="themeIcon"></mdui-icon>
        <span id="themeLabel">跟随系统</span>
      </mdui-button>
      <mdui-menu selects="single" value="system" id="themeMenu">
        <mdui-menu-item value="light" icon="light_mode">亮色模式</mdui-menu-item>
        <mdui-menu-item value="dark" icon="dark_mode">暗色模式</mdui-menu-item>
        <mdui-menu-item value="system" icon="settings_suggest">跟随系统</mdui-menu-item>
      </mdui-menu>
    </mdui-dropdown>
  </div>

  <!-- Header -->
  <section class="page-header">
    <div class="page-header-content">
      <h1>VR 全景</h1>
      <div style="margin-top:1rem;">
        <mdui-button href="index.html" variant="outlined" style="color:#fff; border-color:rgba(255,255,255,0.5)">返回首页</mdui-button>
      </div>
    </div>
  </section>

  <!-- VR Content -->
  <div class="vr-section">

    <div class="vr-card">
      <div class="vr-card-body">
        <h3>720yun VR 全景</h3>
        <p>在线沉浸式浏览育英校园全景，支持鼠标拖拽、手机陀螺仪交互。</p>
        <mdui-button href="http://720yun.com/t/85o8ljnaercdxln604" target="_blank" variant="filled">前往 720yun</mdui-button>
      </div>
    </div>

    <div class="vr-card">
      <div class="vr-card-body">
        <h3>YouTube VR 视频</h3>
        <p>育英 Minecraft 计划 VR 演示视频，支持 360° 全景播放。</p>
        <mdui-button href="https://youtu.be/l9ow1rA80oY" target="_blank" variant="filled">前往 YouTube</mdui-button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div>Copyright &copy; 2017 大育英帝国 Minecraft 计划项目组</div>
    <div style="margin-top: 0.5rem;">
      <a href="index.html">返回首页</a>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.5;">
      Built with <a href="https://www.mdui.org" target="_blank">MDUI v2</a> &middot; Assisted by <a href="https://claude.ai/code" target="_blank">Claude Code</a> (Xiaomi MiMo V2 Pro)
    </div>
  </footer>

  <!-- FAB Navigation -->
  <div style="position:fixed;bottom:2rem;right:2rem;z-index:1000;display:flex;flex-direction:column;gap:0.75rem;align-items:center;">
    <mdui-fab href="index.html"><mdui-icon name="home" slot="icon"></mdui-icon></mdui-fab>
    <mdui-fab href="photo.html"><mdui-icon name="photo_library" slot="icon"></mdui-icon></mdui-fab>
    <mdui-fab href="#"><mdui-icon name="panorama" slot="icon"></mdui-icon></mdui-fab>
  </div>

  <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <script>
    // Dark mode: dropdown with light/dark/system
    const html = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    const themeMenu = document.getElementById('themeMenu');

    function applyTheme(mode) {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      const themeLabel = document.getElementById('themeLabel');
      let dark;
      if (mode === 'system') {
        dark = mq.matches;
        themeIcon.setAttribute('name', 'settings_suggest');
        themeLabel.textContent = '跟随系统';
      } else if (mode === 'dark') {
        dark = true;
        themeIcon.setAttribute('name', 'dark_mode');
        themeLabel.textContent = '暗色模式';
      } else {
        dark = false;
        themeIcon.setAttribute('name', 'light_mode');
        themeLabel.textContent = '亮色模式';
      }
      html.classList.toggle('mdui-theme-dark', dark);
    }

    let savedMode = localStorage.getItem('theme-mode') || 'system';
    themeMenu.value = savedMode;
    applyTheme(savedMode);

    themeMenu.addEventListener('change', () => {
      savedMode = themeMenu.value;
      localStorage.setItem('theme-mode', savedMode);
      applyTheme(savedMode);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (savedMode === 'system') applyTheme('system');
    });
  </script>
</body>
</html>
