<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 全景 - 大育英帝国 Minecraft 计划</title>
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --mdui-color-primary: #00897b;
      --mdui-color-on-primary: #ffffff;
      --mdui-color-primary-container: #a7f3d0;
      --mdui-color-surface: #fdfcff;
      --mdui-color-surface-variant: #ece4e0;
    }
    body { background: #f5f5f5; }

    .page-header {
      position: relative;
      min-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('images/background.jpg') center/cover no-repeat;
      filter: brightness(0.45);
    }
    .page-header-content {
      position: relative;
      z-index: 1;
      color: #fff;
      padding: 2rem;
    }
    .page-header-content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .vr-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .vr-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }
    .vr-card-body {
      padding: 1.5rem 2rem 2rem;
    }
    .vr-card h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #333;
    }
    .vr-card p {
      color: #666;
      line-height: 1.7;
      margin: 0 0 1rem;
    }
    .vr-card mdui-button {
      margin-right: 0.5rem;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
    }

    .site-footer {
      background: #263238;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      line-height: 2;
    }
    .site-footer a { color: #a7f3d0; text-decoration: none; }

    .mdui-theme-dark { background: #121212; }
    .mdui-theme-dark .vr-card { background: #1e1e1e; }
    .mdui-theme-dark .vr-card h3 { color: #e0e0e0; }
    .mdui-theme-dark .vr-card p { color: #aaa; }
    .mdui-theme-dark .site-footer { background: #0d1117; }

    @media (max-width: 600px) {
      .page-header-content h1 { font-size: 1.6rem; }
      .page-header { min-height: 30vh; }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <mdui-button-icon class="theme-toggle" id="themeToggle" title="切换主题">
    <mdui-icon-dark-mode id="themeIcon"></mdui-icon-dark-mode>
  </mdui-button-icon>

  <!-- Header -->
  <section class="page-header">
    <div class="page-header-content">
      <h1>VR 全景</h1>
      <div style="margin-top:1rem;">
        <mdui-button href="index.html" variant="outlined" style="color:#fff; border-color:rgba(255,255,255,0.5)">返回首页</mdui-button>
      </div>
    </div>
  </section>

  <!-- VR Content -->
  <div class="vr-section">

    <div class="vr-card">
      <div class="vr-card-body">
        <h3>720yun VR 全景</h3>
        <p>在线沉浸式浏览育英校园全景，支持鼠标拖拽、手机陀螺仪交互。</p>
        <mdui-button href="http://720yun.com/t/85o8ljnaercdxln604" target="_blank" variant="filled">前往 720yun</mdui-button>
      </div>
    </div>

    <div class="vr-card">
      <div class="vr-card-body">
        <h3>YouTube VR 视频</h3>
        <p>育英 Minecraft 计划 VR 演示视频，支持 360° 全景播放。</p>
        <mdui-button href="https://youtu.be/l9ow1rA80oY" target="_blank" variant="filled">前往 YouTube</mdui-button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div>Copyright &copy; 2017 大育英帝国 Minecraft 计划项目组</div>
    <div style="margin-top: 0.5rem;">
      <a href="index.html">返回首页</a>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.5;">
      Built with <a href="https://www.mdui.org" target="_blank">MDUI v2</a> &middot; Assisted by <a href="https://claude.ai/code" target="_blank">Claude Code</a> (Xiaomi MiMo V2 Pro)
    </div>
  </footer>

  <script type="importmap">
  {
    "imports": {
      "tslib": "https://unpkg.com/tslib@2/tslib.es6.js",
      "lit": "https://unpkg.com/lit/index.js",
      "lit/decorators/custom-element.js": "https://unpkg.com/lit/decorators/custom-element.js",
      "@mdui/shared/icons/shared/style.js": "https://unpkg.com/@mdui/shared/icons/shared/style.js",
      "@mdui/shared/icons/shared/svg-tag.js": "https://unpkg.com/@mdui/shared/icons/shared/svg-tag.js"
    }
  }
  </script>
  <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>
  <script type="module">
    import './lib/mdui/icons/dark-mode.js';
    import './lib/mdui/icons/light-mode.js';
  </script>
  <script>
    // Dark mode
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');
    let manualOverride = null;

    function applyTheme(dark) {
      html.classList.toggle('mdui-theme-dark', dark);
      icon.outerHTML = dark
        ? '<mdui-icon-light-mode id="themeIcon"></mdui-icon-light-mode>'
        : '<mdui-icon-dark-mode id="themeIcon"></mdui-icon-dark-mode>';
    }

    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    applyTheme(mq.matches);

    mq.addEventListener('change', e => {
      if (manualOverride === null) applyTheme(e.matches);
    });

    toggle.addEventListener('click', () => {
      manualOverride = !html.classList.contains('mdui-theme-dark');
      applyTheme(manualOverride);
    });
  </script>
</body>
</html>
