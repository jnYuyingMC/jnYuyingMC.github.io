<!DOCTYPE html>
<html>
  <head>
    <title>VR View - 大育英帝国 Minecraft 计划</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8" />
    <link href="../style.css" rel="stylesheet" type="text/css">
    <style>
      body {
        background: #263238;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .vr-header {
        background: linear-gradient(135deg, #00897b, #004d40);
        color: #fff;
        text-align: center;
        padding: 1.5rem 1rem;
      }
      .vr-header h1 {
        font-size: 1.4rem;
        margin: 0 0 0.3rem;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .vr-header p {
        font-size: 0.85rem;
        margin: 0;
        opacity: 0.8;
      }
      .vr-badge {
        display: inline-block;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 0.2rem 0.8rem;
        font-size: 0.75rem;
        margin-top: 0.6rem;
      }
      #vrview {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
      }
      .vr-footer {
        text-align: center;
        padding: 1rem;
        color: rgba(255,255,255,0.5);
        font-size: 0.8rem;
      }
      .vr-footer a {
        color: #a7f3d0;
        text-decoration: none;
      }
      .vr-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="vr-header">
      <h1>大育英帝国 Minecraft 计划</h1>
      <p>360° VR 全景漫游 · Google VR View</p>
      <span class="vr-badge">Legacy / 已停止维护</span>
    </div>
    <div id="vrview"></div>
    <div class="vr-footer">
      <a href="https://jnyuyingmc.github.io/vr.html">返回 VR 页面</a> &middot;
      <a href="https://jnyuyingmc.github.io/">返回首页</a>
    </div>
    <script src="../../build/vrview.js"></script>
    <script src="index.js"></script>
  </body>
</html>
